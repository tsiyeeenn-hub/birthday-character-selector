<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .option {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 18px;
        }
        input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.5); /* 让圆点大一点，方便点击 */
        }
        .box { padding: 20px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎮 请选择你的身份</h1>
        <input type="text" id="name" placeholder="请输入姓名">
        <br><br>
        
        <div class="option">
            <input type="radio" id="cat" name="c" value="猫">
            <label for="cat">🐱 猫</label>
        </div>
        
        <div class="option">
            <input type="radio" id="dog" name="c" value="狗">
            <label for="dog">🐶 狗</label>
        </div>
        
        <div class="option">
            <input type="radio" id="sloth" name="c" value="树懒">
            <label for="sloth">🦥 树懒</label>
        </div>
        
        <button onclick="submitForm()">确认选择</button>
        <p id="msg"></p>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwnVd6IlDvw097IfDx2i05d4XYo_Ub8KZGdcdD_LbgjgiwlhW9TbuVZaKphkb2v1QbC/exec";
        
        async function submitForm(){
            const name = document.getElementById("name").value.trim();
            // 这一行非常重要，它在寻找 name="c" 的被选中项
            const sel = document.querySelector("input[name=c]:checked"); 
            const msg = document.getElementById("msg");
            
            if(!name){msg.textContent="请输入姓名"; return;}
            if(!sel){msg.textContent="请选择身份"; return;}
            
            msg.textContent = "正在提交...";
            
            try{
            // 请确认你的 fetch 完整代码是这样的：
            await fetch(API, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name: name, character: sel.value })
                });
                document.querySelector(".box").innerHTML = "<h1>🎉 提交成功！</h1><p>感谢 <b>" + name + "</b> 的参与。</p>";
            } catch(e) { 
                msg.textContent="提交遇到错误，请检查网络或联系管理员"; 
            }
        }
    </script>
</body>
</html>
