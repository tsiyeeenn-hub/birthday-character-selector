<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>身份选择</title>
</head>
<body>
    <div class="box">
        <h1>🎮 请选择你的身份</h1>
        <input type="text" id="name" placeholder="请输入姓名">
        <br><br>
        
        <div class="option">
            <input type="radio" id="cat" name="c" value="猫">
            <label for="cat">🐱 猫</label>
        </div>
        <div class="option">
            <input type="radio" id="dog" name="c" value="狗">
            <label for="dog">🐶 狗</label>
        </div>
        <div class="option">
            <input type="radio" id="sloth" name="c" value="树懒">
            <label for="sloth">🦥 树懒</label>
        </div>
        
        <button id="submitBtn">确认选择</button>
        <p id="msg"></p>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwnVd6IlDvw097IfDx2i05d4XYo_Ub8KZGdcdD_LbgjgiwlhW9TbuVZaKphkb2v1QbC/exec";

        document.getElementById("submitBtn").addEventListener("click", async () => {
            const name = document.getElementById("name").value.trim();
            const sel = document.querySelector("input[name=c]:checked");
            const msg = document.getElementById("msg");

            if (!name) { msg.textContent = "请输入姓名"; return; }
            if (!sel) { msg.textContent = "请选择身份"; return; }

            msg.textContent = "正在提交...";

            try {
                // 使用 GET 请求拼接参数
                const url = API + "?name=" + encodeURIComponent(name) + "&character=" + encodeURIComponent(sel.value);
                await fetch(url);
                document.body.innerHTML = "<h1>🎉 提交成功！</h1>";
            } catch (e) {
                msg.textContent = "提交失败，请刷新重试";
            }
        });
    </script>
</body>
</html>
