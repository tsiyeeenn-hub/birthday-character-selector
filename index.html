<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; background-color: #f0f2f5; }
        .box { padding: 40px; border: 1px solid #ddd; border-radius: 20px; width: 350px; text-align: center; background-color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; color: #333; }
        input[type="text"] { width: 85%; padding: 12px; font-size: 16px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .option { text-align: left; display: block; font-size: 18px; margin: 10px 0; padding-left: 20px; }
        button { width: 100%; padding: 15px; font-size: 18px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎮 Please Choose Your Character</h1>
        <input type="text" id="name" placeholder="Enter Your Name">
        <div class="option"><input type="radio" id="cat" name="c" value="Cat"> <label for="cat">🐱 Cat</label></div>
        <div class="option"><input type="radio" id="dog" name="c" value="Dog"> <label for="dog">🐶 Dog</label></div>
        <div class="option"><input type="radio" id="sloth" name="c" value="Sloth"> <label for="sloth">🦥 Sloth</label></div>
        <button id="submitBtn">Submit</button>
        <p id="msg"></p>
    </div>
    <script>
        const API = "https://script.google.com/macros/s/AKfycbwnVd6IlDvWO97IfDx2iO5d4XYo_Ub8KZGdcDd_LbgjgiwlhW9TbuVZaKphkb2v1QbC/exec";
        document.getElementById("submitBtn").addEventListener("click", async () => {
            const name = document.getElementById("name").value.trim();
            const sel = document.querySelector("input[name=c]:checked");
            const msg = document.getElementById("msg");
            if(!name || !sel) { msg.textContent = "Please enter your name and select a character.！"; return; }
            msg.textContent = "Processing...";
            const url = API + "?name=" + encodeURIComponent(name) + "&character=" + encodeURIComponent(sel.value);
            try { await fetch(url); document.querySelector(".box").innerHTML = "<h1>🎉 Done！</h1>"; } 
            catch(e) { msg.textContent = "Submission failed. Please try again."; }
        });
    </script>
</body>
</html>
