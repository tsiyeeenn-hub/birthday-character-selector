<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>身份选择器</title>
    <style>
        .box { padding: 20px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎮 请选择你的身份</h1>
        <input type="text" id="name" placeholder="请输入姓名">
        <br><br>
        
        <div class="option">
            <input type="radio" id="cat" name="c" value="猫">
            <label for="cat">🐱 猫</label>
        </div>
        <div class="option">
            <input type="radio" id="dog" name="c" value="狗">
            <label for="dog">🐶 狗</label>
        </div>
        <div class="option">
            <input type="radio" id="sloth" name="c" value="树懒">
            <label for="sloth">🦥 树懒</label>
        </div>
        
        <button onclick="submitForm()">确认选择</button>
        <p id="msg"></p>
    </div>

    <script>
        // 这里的 API 地址保持不变
        const API = "https://script.google.com/macros/s/AKfycbwnVd6IlDvw097IfDx2i05d4XYo_Ub8KZGdcdD_LbgjgiwlhW9TbuVZaKphkb2v1QbC/exec";

        async function submitForm() {
            const name = document.getElementById("name").value.trim();
            const sel = document.querySelector("input[name=c]:checked");
            const msg = document.getElementById("msg");

            if (!name) { msg.textContent = "请输入姓名"; return; }
            if (!sel) { msg.textContent = "请选择身份"; return; }

            msg.textContent = "正在提交...";

            try {
                // 这是你问的“第二步”，我已经帮你加进去了
                await fetch(API, {
                    method: "POST",
                    mode: "no-cors", // <--- 关键就在这行，它能跳过 CORS 拦截
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: name, character: sel.value })
                });
                
                // 提交成功后的反馈
                document.querySelector(".box").innerHTML = "<h1>🎉 提交成功！</h1>";
            } catch (e) {
                msg.textContent = "提交失败，请联系管理员";
            }
        }
    </script>
</body>
</html>
