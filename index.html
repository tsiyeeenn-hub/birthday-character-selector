<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>身份选择器</title>
    <style>
        .box { padding: 20px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎮 请选择你的身份</h1>
        <input type="text" id="name" placeholder="请输入姓名">
        <br><br>
        
        <div class="option">
            <input type="radio" id="cat" name="c" value="猫">
            <label for="cat">🐱 猫</label>
        </div>
        <div class="option">
            <input type="radio" id="dog" name="c" value="狗">
            <label for="dog">🐶 狗</label>
        </div>
        <div class="option">
            <input type="radio" id="sloth" name="c" value="树懒">
            <label for="sloth">🦥 树懒</label>
        </div>
        
        <button onclick="submitForm()">确认选择</button>
        <p id="msg"></p>
    </div>

    <script>
        // 这里的 API 地址保持不变
   <script>
  const API = "YOUR_DEPLOYED_WEB_APP_URL_HERE";

  document.getElementById("submitBtn").addEventListener("click", async () => {
    const name = document.getElementById("name").value.trim();
    const sel = document.querySelector("input[name=c]:checked");
    const msg = document.getElementById("msg");

    if (!name || !sel) {
      msg.textContent = "Please enter your name and select a character.";
      return;
    }

    msg.textContent = "Submitting...";
    
    // Construct the URL with parameters
    const url = `${API}?name=${encodeURIComponent(name)}&character=${encodeURIComponent(sel.value)}`;

    try {
      await fetch(url);
      document.querySelector(".box").innerHTML = "<h1>🎉 Success!</h1>";
    } catch (e) {
      msg.textContent = "Submission failed. Please try again.";
        }
    </script>
</body>
</html>
